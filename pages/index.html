<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sonyKorea</title>

<body>
  <div id="skip-nav">

  <div id="wrap">

        <div class="util">

        </div>

              </ul>
            </li>
            <li>
              <a href="#"><span>스토어</span></a>
              <ul class="nav-all__depth2">
                <li><a href="#">없음</a></li>
              </ul>
            </li>
            <li>
              <a href="#"><span>제품 메뉴</span></a>
              <ul class="nav-all__depth2">
                <li><a href="#">카메라</a></li>
                <li><a href="#">오디오, 카오디오</a></li>
                <li><a href="#">게임용 기어</a></li>

              </ul>
            </li>
            <li>
              <a href="#"><span>PLAY STATION</span></a>
              <ul class="nav-all__depth2">
                <li><a href="#">없음</a></li>
              </ul>
            </li>
            <li>
              <a href="#"><span>지원</span></a>
              <ul class="nav-all__depth2">
                <li><a href="#">없음</a></li>
              </ul>
            </li>
          </ul>

          <button class="close">
            <span class="close">전체메뉴 닫기</span>
          </button>
        </nav>
      </div>
    </header>

    <!-- main content 시작 -->
    <main>
      <div class="cont__promot">
        <section class="promot__wrap">
          <div class="promot__inner">
            <div class="swiper-slide">
              <a href="#">
                <img src="" alt="">
                <strong></strong>
                <em></em>
              </a>
            </div>
          </div>
        </section>
      </div>
      
    </main>
    <footer></footer>

</html>
